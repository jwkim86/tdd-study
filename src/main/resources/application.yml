spring:
  application:
    name: tddstudy

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:tddstudy // In-memory database configuration
    username: sa
    password: password

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create
      show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        use_sql_comments: true
